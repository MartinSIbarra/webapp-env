# Configuración necesaria para correr como no-root
pid /home/proxy/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # SOLUCIÓN: Redirigir logs de acceso y errores a rutas con permisos
    access_log /home/proxy/nginx/access.log;
    error_log /home/proxy/nginx/error.log;

    # Redirigimos archivos temporales a /home/proxy/nginx (permisos para todos)
    client_body_temp_path /home/proxy/nginx/client_body;
    proxy_temp_path       /home/proxy/nginx/proxy_temp;
    fastcgi_temp_path     /home/proxy/nginx/fastcgi_temp;
    uwsgi_temp_path       /home/proxy/nginx/uwsgi_temp;
    scgi_temp_path        /home/proxy/nginx/scgi_temp;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 3000;
        server_name localhost;

        # 1. Redirigir el Frontend
        location / {
            proxy_pass http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2. Redirigir el Backend
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}