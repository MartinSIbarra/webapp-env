# Lista de servicios (cada uno se ejecuta como contenedor separado)
services:
  # Servicio frontend: app React + Bun + Vite
  frontend:
    # Construcción de la imagen a partir del contexto local './frontend'
    build:
      context: ./frontend   # Carpeta que contiene Dockerfile y código fuente
      args:
        MODE: ${MODE:-development}  # ARG pasado al Dockerfile; por defecto 'development'
        USER_UID: ${UID:-1000}      # Hace coincidir el UID del contenedor con el usuario del host para el bind mount
        USER_GID: ${GID:-1000}      # Hace coincidir el GID del contenedor con el grupo del host para el bind mount
    image: frontend:latest  # Nombre:etiqueta de la imagen resultante

    secrets:
      - github_key  # Inyecta el secreto 'github_key' definido al final del archivo (clave SSH para GitHub)

    # Mapeo de puertos host:contenedor (puedes sobreescribir FRONTEND_PORT)
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_HPORT:-5173}" # Si FRONTEND_PORT no está definido usa 5173

    # Variables de entorno inyectadas en tiempo de ejecución dentro del contenedor
    environment:
      - APP_REPO=${APP_REPO:-git@github.com:MartinSIbarra/frontend.git}
                                                # URL del repositorio Git de la app (por defecto apunta a un repo de ejemplo)
      - MODE=${MODE:-development}               # Indica modo lógico (dev/prod)
      - PORT=${FRONTEND_PORT:-5173}             # Puerto que la app escucha dentro del contenedor
      - API_URL=${API_URL:-http://backend:8000} # URL base de la API (por defecto apunta a 'backend')

    # Volúmenes: en desarrollo montamos el código para hot-reload
    volumes:
      - ./frontend/app:/home/frontend/app      # Monta la carpeta local en /frontend del contenedor (edita localmente)
    #   - /app/node_modules    # Volumen anónimo para evitar sobrescribir node_modules del contenedor

    # Redes a las que se conecta este servicio
    networks:
      - appnet


# Definición de redes personalizadas usadas por los servicios
networks:
  appnet:
    driver: bridge  # Driver 'bridge' (red por defecto para contenedores en la misma máquina)

secrets:
  github_key:
    # Ruta al archivo que contiene la clave SSH para GitHub (ajusta según tu entorno)
    file: ${SSH_KEY_PATH:-$HOME/.ssh/id_ed25519}  

# Notas adicionales:
# - ${VAR:-default} -> usa 'default' si VAR está unset o vacío.
# - Para acceso completo de lectura/escritura sobre volúmenes bind-mounted en Linux,
#   conviene exportar UID/GID del usuario host antes de construir/levantar: `export UID=$(id -u) GID=$(id -g)`.
# - 'depends_on' controla orden de arranque, pero no espera checks de salud. Para esperar salud,
#   añade 'healthcheck' al servicio backend y lógica de espera en frontend.
# - En producción es recomendable eliminar el volumen './frontend:/app' y construir
#   la app dentro de la imagen para reproducibilidad y rendimiento.
